# =========================================================
# GitHub Actions CI Workflow
# =========================================================
#
# Builds the project automatically on Linux and Windows.
#
# Linux:
#   Confirms the project builds cleanly with system Qt packages.
#
# Windows:
#   Builds the Qt GUI using Visual Studio, packages the GUI
#   executable with Qt runtime files, packages the Python mock
#   server as an .exe, and uploads a downloadable artifact.
#
# File extension:
#   .yml = YAML configuration format
#
# =========================================================

name: CMake Qt CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  # =======================================================
  # Windows Build + Package Job
  # =======================================================

  build-windows:
    runs-on: windows-latest

    steps:
      # ---------------------------------------------------
      # Download repository source code
      # ---------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Install Qt for Windows
      # ---------------------------------------------------
      #
      # qtdatavis3d:
      #   Required for Q3DSurface / 3D RF surface mapping.
      #

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtdatavis3d'

      # ---------------------------------------------------
      # Configure CMake using Visual Studio generator
      # ---------------------------------------------------

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022"

      # ---------------------------------------------------
      # Build Release executable
      # ---------------------------------------------------
      #
      # Produces:
      #   build\Release\scpi_cpp_qt_demo.exe
      #

      - name: Build project
        run: cmake --build build --config Release

      # ---------------------------------------------------
      # Deploy Qt runtime files
      # ---------------------------------------------------
      #
      # windeployqt copies required Qt DLLs/plugins next
      # to the GUI executable so it can run on another PC.
      #

      - name: Deploy Qt runtime
        run: |
          mkdir package
          copy build\Release\scpi_cpp_qt_demo.exe package\
          windeployqt package\scpi_cpp_qt_demo.exe

      # ---------------------------------------------------
      # Package Python mock SCPI server
      # ---------------------------------------------------
      #
      # PyInstaller creates:
      #   dist\mock_scpi_server.exe
      #

      - name: Package Python mock server
        run: |
          pip install pyinstaller
          pyinstaller --onefile mock\mock_scpi_server.py
          copy dist\mock_scpi_server.exe package\


      # ---------------------------------------------------
      # Upload downloadable Windows package
      # ---------------------------------------------------
      #
      # Download from:
      # GitHub → Actions → latest run → Artifacts
      #

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: scpi-cpp-instrument-demo-windows
          path: package

  # =======================================================
  # Ubuntu Build Job
  # =======================================================

  build-ubuntu:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # Download repository source code
      # ---------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Install compiler + Qt dependencies
      # ---------------------------------------------------

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            cmake \
            g++ \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-datavisualization-dev

      # ---------------------------------------------------
      # Configure CMake project
      # ---------------------------------------------------

      - name: Configure CMake
        run: |
          cmake -S . -B build

      # ---------------------------------------------------
      # Build project
      # ---------------------------------------------------

      - name: Build project
        run: |
          cmake --build build